[build]
  publish = "."
  command = "echo 'Static site - no build needed'"
  functions = "netlify/functions"
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- index.html script.js styles.css live.js netlify.toml netlify/ favicon.svg og-image.svg"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Clean URLs for stock pages
[[redirects]]
  from = "/stock/:ticker"
  to = "/s/:ticker.html"
  status = 200
