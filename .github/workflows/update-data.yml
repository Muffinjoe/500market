name: Update S&P 500 Data

on:
  schedule:
    # Run at 9:30 PM UTC (4:30 PM ET) — right after market close
    - cron: '30 21 * * 1-5'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Fetch live S&P 500 data
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python3 fetch_live_data.py

      - name: Commit and push updated data
        run: |
          git config user.name "500Market Bot"
          git config user.email "bot@500market.com"
          git add -A
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "Update S&P 500 data — $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
